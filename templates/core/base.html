<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="NutriTrack - Your personal Indian diet and nutrition planner">
  <title>{% block title %}NutriTrack{% endblock %}</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/styles.css' %}">
  <style>
    /* Remove default form styling from Django */
    ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    li {
      margin: 0;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="{% url 'home' %}">NutriTrack</a>
      <nav>
        <a href="{% url 'home' %}">Home</a>
        <a href="{% url 'foods-list' %}">Foods</a>
        {% if user.is_authenticated %}
          <a href="{% url 'meal-logs' %}">Meal Logs</a>
          <a href="{% url 'plans' %}">Plans</a>
          <a href="{% url 'daily-summary-page' %}">Daily Summary</a>
          <a href="{% url 'profile' %}">Profile</a>
          <form method="post" action="{% url 'logout' %}" style="display:inline; margin:0; padding:0;">
            {% csrf_token %}
            <button type="submit" class="btn btn-secondary" style="font-size:0.95rem; padding:0.4rem 0.8rem; margin-left:0.5rem;">Logout</button>
          </form>
        {% else %}
          <a href="{% url 'login' %}">Login</a>
          <a href="{% url 'register' %}">Register</a>
        {% endif %}
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <p>&copy; 2026 NutriTrack. Your personal nutrition planner for Indian cuisine.</p>
  </footer>
</body>
</html>
